<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#140a0a"/>
      <stop offset="50%" stop-color="#0a0606"/>
      <stop offset="100%" stop-color="#030202"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="10"/></filter>
    <linearGradient id="red-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3344"/><stop offset="100%" stop-color="#991122"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="180" rx="200" ry="150" fill="#cc2b2b" opacity="0.04" filter="url(#soft)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#cc2b2b" stroke-width="0.4">
    <line x1="0" y1="340" x2="600" y2="340"/><line x1="0" y1="360" x2="600" y2="360"/><line x1="0" y1="380" x2="600" y2="380"/>
    <line x1="100" y1="340" x2="100" y2="400"/><line x1="200" y1="340" x2="200" y2="400"/>
    <line x1="300" y1="340" x2="300" y2="400"/><line x1="400" y1="340" x2="400" y2="400"/>
    <line x1="500" y1="340" x2="500" y2="400"/>
  </g>

  <!-- Data stream lines with particle effect -->
  <g opacity="0.08">
    <path d="M 20 150 Q 150 180 280 140 T 580 150" fill="none" stroke="#cc2b2b" stroke-width="1"/>
    <path d="M 30 190 Q 160 220 290 180 T 570 190" fill="none" stroke="#cc2b2b" stroke-width="0.8"/>
    <path d="M 20 230 Q 170 260 300 220 T 580 230" fill="none" stroke="#cc2b2b" stroke-width="0.7"/>
    <path d="M 40 270 Q 180 300 310 260 T 570 270" fill="none" stroke="#cc2b2b" stroke-width="0.6"/>
  </g>

  <!-- Streaming data dots on lines -->
  <g fill="#cc2b2b" opacity="0.5">
    <circle cx="120" cy="158" r="2" filter="url(#glow)"/>
    <circle cx="350" cy="148" r="2.5" filter="url(#glow)"/>
    <circle cx="480" cy="152" r="1.5"/>
    <circle cx="200" cy="195" r="2"/>
    <circle cx="420" cy="188" r="2.5" filter="url(#glow)"/>
    <circle cx="160" cy="238" r="2"/>
    <circle cx="380" cy="228" r="1.5"/>
    <circle cx="250" cy="268" r="2"/>
    <circle cx="450" cy="258" r="2" filter="url(#glow)"/>
  </g>

  <!-- Live chart area -->
  <g transform="translate(50, 290)" opacity="0.3">
    <polyline points="0,35 20,30 40,38 60,15 80,28 100,8 120,22 140,12 160,28 180,18 200,5 220,15 240,28 260,10 280,20 300,8 320,3 340,12 360,6 380,15 400,8 420,3 440,10 460,5 480,2"
      fill="none" stroke="#cc2b2b" stroke-width="2" filter="url(#glow)"/>
    <polygon points="0,35 0,40 480,40 480,2 460,5 440,10 420,3 400,8 380,15 360,6 340,12 320,3 300,8 280,20 260,10 240,28 220,15 200,5 180,18 160,28 140,12 120,22 100,8 80,28 60,15 40,38 20,30 0,35"
      fill="#cc2b2b" opacity="0.05"/>
  </g>

  <!-- Server rack -->
  <g transform="translate(460, 60)" opacity="0.25">
    <rect x="0" y="0" width="60" height="110" rx="4" fill="none" stroke="#cc2b2b" stroke-width="0.8"/>
    <rect x="5" y="8" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.3"/>
    <rect x="5" y="24" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.2"/>
    <rect x="5" y="40" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.4"/>
    <rect x="5" y="56" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.2"/>
    <rect x="5" y="72" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.3"/>
    <rect x="5" y="88" width="50" height="12" rx="2" fill="#cc2b2b" opacity="0.2"/>
    <circle cx="30" cy="103" r="3" fill="#cc2b2b" opacity="0.5"/>
  </g>

  <!-- Top lens flare -->
  <ellipse cx="250" cy="50" rx="80" ry="6" fill="#cc2b2b" opacity="0.03" filter="url(#soft)" transform="rotate(-15 250 50)"/>

  <!-- Floating analytics icons -->
  <g opacity="0.06">
    <rect x="80" y="80" width="20" height="8" rx="1" fill="#cc2b2b"/>
    <rect x="110" y="85" width="20" height="3" rx="1" fill="#cc2b2b"/>
    <polyline points="150,83 160,78 170,85 180,75 190,82" fill="none" stroke="#cc2b2b" stroke-width="1.5"/>
  </g>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#bg)" opacity="0.1"/>
</svg>
