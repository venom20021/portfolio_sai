<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc2b2b"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(204,43,43,0.12)"/>
      <stop offset="100%" stop-color="rgba(204,43,43,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
  </g>

  <!-- Red glow -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#accent2)"/>

  <!-- Data flow visualization -->
  <g opacity="0.5">
    <!-- Kafka-like data streams -->
    <path d="M 30 120 Q 150 180 280 120 T 570 120" fill="none" stroke="#cc2b2b" stroke-width="1.5" opacity="0.4"/>
    <path d="M 30 160 Q 150 220 280 160 T 570 160" fill="none" stroke="#cc2b2b" stroke-width="1.5" opacity="0.3"/>
    <path d="M 30 200 Q 150 260 280 200 T 570 200" fill="none" stroke="#cc2b2b" stroke-width="1.5" opacity="0.4"/>
    <path d="M 30 240 Q 150 300 280 240 T 570 240" fill="none" stroke="#cc2b2b" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Data nodes/events flowing -->
  <g opacity="0.6">
    <circle cx="100" cy="140" r="4" fill="#cc2b2b"/><circle cx="180" cy="148" r="3" fill="#cc2b2b" opacity="0.7"/>
    <circle cx="340" cy="138" r="4" fill="#cc2b2b"/><circle cx="420" cy="142" r="3" fill="#cc2b2b" opacity="0.7"/>
    <circle cx="510" cy="128" r="3" fill="#cc2b2b" opacity="0.5"/>

    <circle cx="120" cy="180" r="3" fill="#cc2b2b" opacity="0.5"/>
    <circle cx="220" cy="188" r="4" fill="#cc2b2b"/>
    <circle cx="380" cy="178" r="3" fill="#cc2b2b" opacity="0.7"/>
    <circle cx="470" cy="170" r="4" fill="#cc2b2b"/>

    <circle cx="80" cy="220" r="4" fill="#cc2b2b"/>
    <circle cx="200" cy="228" r="3" fill="#cc2b2b" opacity="0.5"/>
    <circle cx="360" cy="218" r="4" fill="#cc2b2b"/>
    <circle cx="490" cy="210" r="3" fill="#cc2b2b" opacity="0.7"/>
  </g>

  <!-- Real-time chart - line graph -->
  <g transform="translate(60, 290)" opacity="0.6">
    <polyline points="0,40 20,35 40,45 60,20 80,30 100,10 120,25 140,15 160,30 180,20 200,8 220,18 240,30 260,12 280,22 300,10 320,5 340,15 360,8 380,18 400,10 420,5 440,12 460,8 480,3"
      fill="none" stroke="#cc2b2b" stroke-width="2"/>
    <!-- Area fill -->
    <polygon points="0,40 0,50 480,50 480,3 460,8 440,12 420,5 400,10 380,18 360,8 340,15 320,5 300,10 280,22 260,12 240,30 220,18 200,8 180,20 160,30 140,15 120,25 100,10 80,30 60,20 40,45 20,35 0,40"
      fill="url(#accent2)"/>
  </g>

  <!-- Server rack visualization -->
  <g transform="translate(430, 50)" opacity="0.35">
    <rect x="0" y="0" width="50" height="90" rx="3" fill="none" stroke="#cc2b2b" stroke-width="1"/>
    <rect x="5" y="8" width="40" height="10" rx="2" fill="#cc2b2b" opacity="0.4"/>
    <rect x="5" y="22" width="40" height="10" rx="2" fill="#cc2b2b" opacity="0.3"/>
    <rect x="5" y="36" width="40" height="10" rx="2" fill="#cc2b2b" opacity="0.5"/>
    <rect x="5" y="50" width="40" height="10" rx="2" fill="#cc2b2b" opacity="0.3"/>
    <rect x="5" y="64" width="40" height="10" rx="2" fill="#cc2b2b" opacity="0.4"/>
    <circle cx="25" cy="82" r="3" fill="#cc2b2b" opacity="0.6"/>
  </g>

  <!-- Project title -->
  <text x="300" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" filter="url(#glow)">Analytics Platform</text>
  <text x="300" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#cc2b2b" letter-spacing="3">GO · KAFKA · KUBERNETES</text>
</svg>
