<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc2b2b"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(204,43,43,0.15)"/>
      <stop offset="100%" stop-color="rgba(204,43,43,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/><line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/><line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
  </g>

  <!-- Red glow accent -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#accent2)"/>

  <!-- Neural network nodes & connections -->
  <g opacity="0.6">
    <line x1="100" y1="80" x2="200" y2="140" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="80" x2="200" y2="180" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="80" x2="200" y2="220" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="140" x2="350" y2="100" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="140" x2="350" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="180" x2="350" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="180" x2="350" y2="220" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="220" x2="350" y2="220" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="350" y1="100" x2="500" y2="60" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="350" y1="100" x2="500" y2="120" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="350" y1="160" x2="500" y2="120" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="350" y1="220" x2="500" y2="180" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="350" y1="220" x2="500" y2="240" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>

    <circle cx="100" cy="80" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="200" cy="140" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="200" cy="180" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="200" cy="220" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="350" cy="100" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="350" cy="160" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="350" cy="220" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="500" cy="60" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="500" cy="120" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="500" cy="180" r="5" fill="#cc2b2b" opacity="0.6"/>
    <circle cx="500" cy="240" r="5" fill="#cc2b2b" opacity="0.6"/>
  </g>

  <!-- Data flow lines -->
  <g opacity="0.3">
    <path d="M 50 320 Q 150 280 200 300 T 350 290 T 550 310" fill="none" stroke="#cc2b2b" stroke-width="1.5" stroke-dasharray="4,4"/>
    <path d="M 50 340 Q 200 370 300 330 T 500 350 T 550 340" fill="none" stroke="#cc2b2b" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Bar chart -->
  <g transform="translate(60, 280)" opacity="0.5">
    <rect x="0" y="30" width="30" height="50" rx="2" fill="#cc2b2b" opacity="0.5"/>
    <rect x="40" y="15" width="30" height="65" rx="2" fill="#cc2b2b" opacity="0.6"/>
    <rect x="80" y="25" width="30" height="55" rx="2" fill="#cc2b2b" opacity="0.5"/>
    <rect x="120" y="5" width="30" height="75" rx="2" fill="#cc2b2b" opacity="0.7"/>
    <rect x="160" y="20" width="30" height="60" rx="2" fill="#cc2b2b" opacity="0.5"/>
  </g>

  <!-- Project title -->
  <text x="300" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" filter="url(#glow)">ML Predictive Pipeline</text>
  <text x="300" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#cc2b2b" letter-spacing="3">PYTHON · TENSORFLOW · AWS</text>
</svg>
