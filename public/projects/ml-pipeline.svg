<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a0d0d"/>
      <stop offset="40%" stop-color="#0d0808"/>
      <stop offset="100%" stop-color="#050303"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="#cc2b2b" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#cc2b2b" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3344"/>
      <stop offset="100%" stop-color="#991122"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Ambient red glow -->
  <ellipse cx="300" cy="180" rx="200" ry="140" fill="#cc2b2b" opacity="0.04" filter="url(#soft)"/>
  <ellipse cx="300" cy="200" rx="250" ry="20" fill="url(#vignette)"/>

  <!-- Grid floor -->
  <g opacity="0.05" stroke="#cc2b2b" stroke-width="0.4">
    <path d="M 0 340 L 600 340 M 0 360 L 600 360 M 0 380 L 600 380"/>
    <path d="M 80 340 L 80 400 M 160 340 L 160 400 M 240 340 L 240 400 M 320 340 L 320 400 M 400 340 L 400 400 M 480 340 L 480 400"/>
  </g>

  <!-- 3D Neural Network -->
  <g transform="translate(300, 185)">
    <!-- Depth lines -->
    <g opacity="0.12">
      <line x1="-95" y1="-50" x2="-70" y2="-35" stroke="#cc2b2b" stroke-width="0.6"/>
      <line x1="-95" y1="-10" x2="-70" y2="-5" stroke="#cc2b2b" stroke-width="0.6"/>
      <line x1="-95" y1="30" x2="-70" y2="25" stroke="#cc2b2b" stroke-width="0.6"/>
    </g>

    <!-- Full connections -->
    <g stroke="#cc2b2b" stroke-width="0.7" opacity="0.15">
      <line x1="-80" y1="-40" x2="-25" y2="-55"/><line x1="-80" y1="-40" x2="-25" y2="-15"/>
      <line x1="-80" y1="-40" x2="-25" y2="25"/><line x1="-80" y1="0" x2="-25" y2="-55"/>
      <line x1="-80" y1="0" x2="-25" y2="-15"/><line x1="-80" y1="0" x2="-25" y2="25"/>
      <line x1="-80" y1="40" x2="-25" y2="-55"/><line x1="-80" y1="40" x2="-25" y2="-15"/>
      <line x1="-80" y1="40" x2="-25" y2="25"/>
      <line x1="-10" y1="-55" x2="25" y2="-45"/><line x1="-10" y1="-55" x2="25" y2="-5"/>
      <line x1="-10" y1="-15" x2="25" y2="-45"/><line x1="-10" y1="-15" x2="25" y2="-5"/>
      <line x1="-10" y1="-15" x2="25" y2="35"/><line x1="-10" y1="25" x2="25" y2="-5"/>
      <line x1="-10" y1="25" x2="25" y2="35"/>
      <line x1="40" y1="-45" x2="80" y2="-15"/><line x1="40" y1="-5" x2="80" y2="-15"/>
      <line x1="40" y1="-5" x2="80" y2="25"/><line x1="40" y1="35" x2="80" y2="25"/>
    </g>

    <!-- Output layer glow -->
    <ellipse cx="80" cy="5" rx="15" ry="28" fill="#cc2b2b" opacity="0.08" filter="url(#soft)"/>

    <!-- Nodes -->
    <g fill="url(#accent)" filter="url(#glow)">
      <circle cx="-80" cy="-40" r="5" opacity="0.6"/><circle cx="-80" cy="0" r="5" opacity="0.6"/>
      <circle cx="-80" cy="40" r="5" opacity="0.6"/>
      <circle cx="-25" cy="-55" r="4.5" opacity="0.7"/><circle cx="-25" cy="-15" r="4.5" opacity="0.7"/>
      <circle cx="-25" cy="25" r="4.5" opacity="0.7"/>
      <circle cx="40" cy="-45" r="4" opacity="0.8"/><circle cx="40" cy="-5" r="4" opacity="0.8"/>
      <circle cx="40" cy="35" r="4" opacity="0.8"/>
      <circle cx="80" cy="-15" r="5" opacity="0.9"/><circle cx="80" cy="25" r="5" opacity="0.9"/>
    </g>

    <!-- Output pulse -->
    <circle cx="80" cy="-15" r="3" fill="#ff5566" opacity="0.5">
      <animate attributeName="r" values="3;8;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data flow particles -->
  <g opacity="0.15">
    <path d="M 30 280 Q 150 250 200 290 T 400 260 T 570 280" fill="none" stroke="#cc2b2b" stroke-width="0.8" stroke-dasharray="3,8"/>
    <path d="M 50 310 Q 180 340 260 300 T 450 320 T 560 310" fill="none" stroke="#cc2b2b" stroke-width="0.6" stroke-dasharray="2,6"/>
  </g>

  <!-- Floating light dots -->
  <circle cx="100" cy="90" r="1.5" fill="#cc2b2b" opacity="0.4"/><circle cx="500" cy="110" r="1" fill="#cc2b2b" opacity="0.3"/>
  <circle cx="480" cy="310" r="1.2" fill="#cc2b2b" opacity="0.3"/><circle cx="130" cy="330" r="1" fill="#cc2b2b" opacity="0.25"/>
  <circle cx="550" cy="270" r="1.5" fill="#cc2b2b" opacity="0.2"/>

  <!-- Camera lens flare -->
  <ellipse cx="200" cy="100" rx="60" ry="8" fill="#cc2b2b" opacity="0.02" filter="url(#soft)" transform="rotate(-20 200 100)"/>

  <!-- Vignette overlay -->
  <rect width="600" height="400" fill="url(#bg)" opacity="0.15"/>
</svg>
