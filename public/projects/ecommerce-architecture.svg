<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#120a0a"/>
      <stop offset="50%" stop-color="#0a0606"/>
      <stop offset="100%" stop-color="#030202"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="10"/></filter>
    <linearGradient id="box-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(204,43,43,0.12)"/>
      <stop offset="100%" stop-color="rgba(204,43,43,0.03)"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="200" ry="150" fill="#cc2b2b" opacity="0.04" filter="url(#soft)"/>

  <!-- Grid floor -->
  <g opacity="0.04" stroke="#cc2b2b" stroke-width="0.4">
    <line x1="0" y1="345" x2="600" y2="345"/><line x1="0" y1="365" x2="600" y2="365"/><line x1="0" y1="385" x2="600" y2="385"/>
  </g>

  <!-- Microservices architecture diagram -->
  <g transform="translate(30, 55)">
    <!-- Colored service boxes -->
    <g stroke="#cc2b2b" stroke-width="0.8" stroke-opacity="0.4" fill="url(#box-grad)">
      <!-- API Gateway -->
      <rect x="220" y="0" width="120" height="38" rx="5"/>
      <text x="280" y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#cc2b2b" opacity="0.7" letter-spacing="1.5">API GATEWAY</text>
      <line x1="280" y1="38" x2="280" y2="55" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>

      <!-- Service Row -->
      <rect x="10" y="55" width="110" height="38" rx="5"/>
      <text x="65" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#cc2b2b" opacity="0.7">ORDER</text>
      <line x1="120" y1="74" x2="220" y2="74" stroke="#cc2b2b" stroke-width="1" opacity="0.2"/>

      <rect x="140" y="55" width="110" height="38" rx="5"/>
      <text x="195" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#cc2b2b" opacity="0.7">USER</text>
      <line x1="250" y1="74" x2="280" y2="74" stroke="#cc2b2b" stroke-width="1" opacity="0.2"/>

      <rect x="270" y="55" width="110" height="38" rx="5"/>
      <text x="325" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#cc2b2b" opacity="0.7">PRODUCT</text>
      <line x1="325" y1="93" x2="325" y2="110" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>

      <rect x="400" y="55" width="110" height="38" rx="5"/>
      <text x="455" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#cc2b2b" opacity="0.7">PAYMENT</text>
      <line x1="400" y1="74" x2="380" y2="74" stroke="#cc2b2b" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- Message Queue -->
    <rect x="100" y="110" width="350" height="32" rx="4" fill="none" stroke="#cc2b2b" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>
    <text x="275" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#cc2b2b" opacity="0.4" letter-spacing="2">MESSAGE QUEUE</text>

    <!-- Database row -->
    <g fill="url(#box-grad)" stroke="#cc2b2b" stroke-width="0.8" stroke-opacity="0.3">
      <ellipse cx="65" cy="168" rx="32" ry="13"/>
      <ellipse cx="195" cy="168" rx="32" ry="13"/>
      <ellipse cx="325" cy="168" rx="32" ry="13"/>
      <ellipse cx="455" cy="168" rx="32" ry="13"/>
      <text x="65" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc2b2b" opacity="0.45">DB</text>
      <text x="195" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc2b2b" opacity="0.45">DB</text>
      <text x="325" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc2b2b" opacity="0.45">DB</text>
      <text x="455" y="172" text-anchor="middle" font-family="monospace" font-size="8" fill="#cc2b2b" opacity="0.45">DB</text>
    </g>
  </g>

  <!-- Connection glow lines -->
  <g opacity="0.06">
    <line x1="280" y1="140" x2="280" y2="400" stroke="#cc2b2b" stroke-width="0.5"/>
    <line x1="195" y1="140" x2="195" y2="400" stroke="#cc2b2b" stroke-width="0.5"/>
    <line x1="325" y1="140" x2="325" y2="400" stroke="#cc2b2b" stroke-width="0.5"/>
    <line x1="455" y1="140" x2="455" y2="400" stroke="#cc2b2b" stroke-width="0.5"/>
  </g>

  <!-- Ambient particles -->
  <circle cx="100" cy="100" r="1.5" fill="#cc2b2b" opacity="0.3"/>
  <circle cx="520" cy="90" r="1" fill="#cc2b2b" opacity="0.25"/>
  <circle cx="480" cy="330" r="1.2" fill="#cc2b2b" opacity="0.2"/>
  <circle cx="80" cy="350" r="1" fill="#cc2b2b" opacity="0.2"/>
  <circle cx="560" cy="300" r="1.5" fill="#cc2b2b" opacity="0.15"/>

  <!-- Lens flare top right -->
  <ellipse cx="450" cy="50" rx="60" ry="5" fill="#cc2b2b" opacity="0.025" filter="url(#soft)" transform="rotate(-10 450 50)"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#bg)" opacity="0.1"/>
</svg>
