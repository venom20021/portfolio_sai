<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc2b2b"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(204,43,43,0.12)"/>
      <stop offset="100%" stop-color="rgba(204,43,43,0)"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(204,43,43,0.15)"/>
      <stop offset="100%" stop-color="rgba(204,43,43,0.05)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
  </g>

  <!-- Red glow -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#accent2)"/>

  <!-- Architecture diagram - service boxes -->
  <g transform="translate(30, 55)">
    <!-- API Gateway -->
    <rect x="220" y="0" width="100" height="35" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="270" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" letter-spacing="2">API GATEWAY</text>
    <line x1="270" y1="35" x2="270" y2="55" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- Order Service -->
    <rect x="0" y="55" width="100" height="35" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="50" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" letter-spacing="1">ORDER</text>
    <line x1="100" y1="72" x2="220" y2="72" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="90" x2="50" y2="110" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- User Service -->
    <rect x="130" y="55" width="100" height="35" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="180" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" letter-spacing="1">USER</text>
    <line x1="230" y1="72" x2="270" y2="72" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="90" x2="180" y2="110" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- Product Service -->
    <rect x="260" y="55" width="100" height="35" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="310" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" letter-spacing="1">PRODUCT</text>
    <line x1="310" y1="90" x2="310" y2="110" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- Payment Service -->
    <rect x="390" y="55" width="100" height="35" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.5"/>
    <text x="440" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" letter-spacing="1">PAYMENT</text>
    <line x1="390" y1="72" x2="360" y2="72" stroke="#cc2b2b" stroke-width="1" opacity="0.3"/>
    <line x1="440" y1="90" x2="440" y2="110" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- Message Queue -->
    <rect x="100" y="110" width="300" height="30" rx="4" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>
    <text x="250" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#cc2b2b" opacity="0.6" letter-spacing="2">MESSAGE QUEUE</text>

    <line x1="50" y1="140" x2="50" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="140" x2="180" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>
    <line x1="310" y1="140" x2="310" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>
    <line x1="440" y1="140" x2="440" y2="160" stroke="#cc2b2b" stroke-width="1" opacity="0.4"/>

    <!-- Databases -->
    <ellipse cx="50" cy="178" rx="30" ry="12" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="50" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#cc2b2b" opacity="0.6">DB</text>

    <ellipse cx="180" cy="178" rx="30" ry="12" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="180" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#cc2b2b" opacity="0.6">DB</text>

    <ellipse cx="310" cy="178" rx="30" ry="12" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="310" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#cc2b2b" opacity="0.6">DB</text>

    <ellipse cx="440" cy="178" rx="30" ry="12" fill="url(#box)" stroke="#cc2b2b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="440" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#cc2b2b" opacity="0.6">DB</text>
  </g>

  <!-- Connected dots -->
  <g opacity="0.3">
    <circle cx="300" cy="100" r="2" fill="#cc2b2b"/>
    <circle cx="300" cy="115" r="2" fill="#cc2b2b"/>
    <circle cx="300" cy="130" r="2" fill="#cc2b2b"/>
  </g>

  <!-- Project title -->
  <text x="300" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" filter="url(#glow)">E-Commerce Architecture</text>
  <text x="300" y="335" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#cc2b2b" letter-spacing="3">NODE.JS · REACT · AWS</text>
</svg>
